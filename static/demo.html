<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>센트럴처치 상담 — 검수용</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #f1f5f9;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #0f172a;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .page {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .card {
    background: #fff;
    width: 100%;
    height: 100%;
    max-width: 560px;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: none;
    border-radius: 0;
  }
  @media (min-width: 640px) {
    .page { padding: 24px; }
    .card {
      max-height: min(820px, 100%);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.18);
      border: 1px solid #e5e7eb;
    }
  }
  .header {
    background: #1e293b;
    color: #fff;
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .header .sub {
    margin-top: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #a5b4fc;
  }
  .disclaimer {
    background: rgba(238, 242, 255, 0.6);
    color: rgba(49, 46, 129, 0.85);
    border-bottom: 1px solid #e0e7ff;
    padding: 12px 20px;
    font-size: 11px;
    line-height: 1.6;
    font-weight: 500;
    word-break: keep-all;
    flex-shrink: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    font-weight: 500;
    white-space: pre-wrap;
    word-break: keep-all;
    overflow-wrap: anywhere;
  }
  .bubble.user {
    background: #4f46e5;
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .bubble.assistant {
    background: #f3f4f6;
    color: #111827;
    border-bottom-left-radius: 6px;
  }
  .bubble.error {
    background: #fef2f2;
    color: #7f1d1d;
    border: 1px solid #fee2e2;
    border-bottom-left-radius: 6px;
  }
  .loader {
    background: #f3f4f6;
    padding: 12px 16px;
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #818cf8;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .dot:nth-child(1) { animation-delay: -0.3s; }
  .dot:nth-child(2) { animation-delay: -0.15s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
    40% { transform: translateY(-6px); opacity: 1; }
  }
  .cold-hint {
    font-size: 10px;
    color: #6b7280;
    font-weight: 500;
    margin-left: 8px;
  }
  .composer {
    border-top: 1px solid #f3f4f6;
    padding: 12px;
    background: #fff;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    resize: none;
    padding: 12px 16px;
    background: #f9fafb;
    border: none;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    font-family: inherit;
    font-weight: 500;
    color: #111827;
    outline: none;
    max-height: 128px;
    transition: background 0.15s, box-shadow 0.15s;
    word-break: keep-all;
  }
  textarea:focus {
    background: #fff;
    box-shadow: 0 0 0 2px #4f46e5;
  }
  textarea:disabled { opacity: 0.5; }
  .send {
    background: #4f46e5;
    color: #fff;
    border: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .send:hover:not(:disabled) { background: #4338ca; }
  .send:disabled { background: #d1d5db; cursor: not-allowed; }
  .send svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="page">
  <div class="card" role="application" aria-label="상담 챗봇">
    <div class="header">
      <h1>센트럴처치 상담</h1>
      <div class="sub">Sermon-Based AI · 검수용</div>
    </div>
    <div class="disclaimer">
      AI가 설교 말씀을 근거로 답변합니다. 더 깊은 상담은 담임 목사님과 직접 나누어 주세요.
    </div>
    <div class="messages" id="messages" aria-live="polite"></div>
    <div class="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="고민이나 질문을 입력하세요..."
        aria-label="질문 입력"
      ></textarea>
      <button class="send" id="send" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  let isLoading = false;

  const initialGreeting = '안녕하세요. 설교 말씀을 바탕으로 신앙 상담을 도와드립니다. 마음에 있는 질문이나 고민을 편하게 적어주세요.';

  const renderMessage = (role, text, isError) => {
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role + (isError ? ' error' : '');
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  };

  let loaderRow = null;
  let coldHintEl = null;
  const showLoader = () => {
    loaderRow = document.createElement('div');
    loaderRow.className = 'row assistant';
    loaderRow.innerHTML =
      '<div class="loader">' +
        '<span class="dot"></span><span class="dot"></span><span class="dot"></span>' +
      '</div>';
    messagesEl.appendChild(loaderRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  };
  const addColdHint = () => {
    if (!loaderRow) return;
    coldHintEl = document.createElement('span');
    coldHintEl.className = 'cold-hint';
    coldHintEl.textContent = '서버 깨우는 중...';
    loaderRow.querySelector('.loader').appendChild(coldHintEl);
  };
  const removeLoader = () => {
    if (loaderRow) loaderRow.remove();
    loaderRow = null;
    coldHintEl = null;
  };

  const setLoading = (v) => {
    isLoading = v;
    inputEl.disabled = v;
    sendBtn.disabled = v || !inputEl.value.trim();
  };

  const autoGrow = () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + 'px';
    sendBtn.disabled = isLoading || !inputEl.value.trim();
  };

  const sendMessage = async () => {
    const q = inputEl.value.trim();
    if (!q || isLoading) return;

    renderMessage('user', q);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);
    showLoader();

    const coldTimer = setTimeout(addColdHint, 8000);
    const controller = new AbortController();
    const abortTimer = setTimeout(() => controller.abort(), 90000);

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
        signal: controller.signal,
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      removeLoader();
      renderMessage('assistant', data.answer);
    } catch (err) {
      removeLoader();
      const isTimeout = err.name === 'AbortError';
      renderMessage(
        'assistant',
        isTimeout
          ? '서버 응답이 너무 오래 걸렸습니다. 잠시 후 다시 시도해 주세요.'
          : '죄송합니다. 답변을 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.',
        true
      );
    } finally {
      clearTimeout(coldTimer);
      clearTimeout(abortTimer);
      setLoading(false);
      inputEl.focus();
    }
  };

  inputEl.addEventListener('input', autoGrow);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  renderMessage('assistant', initialGreeting);
  sendBtn.disabled = true;
</script>
</body>
</html>
